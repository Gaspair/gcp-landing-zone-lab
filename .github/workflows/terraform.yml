on:
  pull_request:
    paths: ['factory/**']
  push:
    branches: [ main ]
    paths: ['factory/**']

permissions:
  contents: read
  id-token: write        # REQUIRED: lets GitHub mint the OIDC token for WIF
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: factory
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (keyless, via WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/338853511303/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'tf-factory-ci@lz-seed-17021.iam.gserviceaccount.com'

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan

      - name: Terraform Apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve